# /etc/apache2/sites-available/000-default.conf
# Configuración del balanceador de carga Apache para Práctica 4 SI2
#
# INSTRUCCIONES:
# 1. Copiar este fichero a /etc/apache2/sites-available/000-default.conf en VM1
# 2. Añadir "Listen 18080" a /etc/apache2/ports.conf (si no existe ya)
# 3. Cambiar XX.YY.ZZ.II por la IP real de VM1
# 4. Cambiar ip_address por la IP real de los workers
# 5. Habilitar módulos: sudo a2enmod proxy proxy_balancer proxy_http lbmethod_byrequests headers rewrite
# 6. Reiniciar Apache: sudo systemctl restart apache2.service

<VirtualHost *:18080>

    ProxyRequests Off

    # change ip_address by the worker nodes IP address
    <Proxy balancer://SI2Cluster>
        BalancerMember http://ip_address:18000 route=Instance01
        BalancerMember http://ip_address:28000 route=Instance02
        BalancerMember http://ip_address:38000 route=Instance03

        ProxySet stickysession=ROUTEID
    </Proxy>

    Header add Set-Cookie "ROUTEID=.%{BALANCER_WORKER_ROUTE}e; path=/" env=BALANCER_ROUTE_CHANGED

    <Location /P1base>
        Require all granted
        ProxyPass balancer://SI2Cluster
        ProxyPassReverse balancer://SI2Cluster
    </Location>

    <Location /balancer-manager>
        SetHandler balancer-manager
    </Location>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/P1base
    RewriteCond %{REQUEST_URI} !^/balancer-manager
    RewriteRule ^(.*)$ /P1base$1 [R,L]

    Header edit Location ^/(?!balancer-manager)([^/]) /P1base/$1

    # change XX.YY.ZZ.II by the server IP number
    ServerName XX.YY.ZZ.II

</VirtualHost>
