# /etc/apache2/sites-available/000-default.conf
# Configuración del balanceador de carga Apache para Práctica 4 SI2
#
# Entorno: VMs en VirtualBox con NAT y port-forwarding del PC host:
#   VM1 host:18080 -> VM:80 (apache), host:18000 -> VM:8000 (django)
#   VM2 host:28080 -> VM:80, host:28000 -> VM:8000
#   VM3 host:38080 -> VM:80, host:38000 -> VM:8000
# Las VMs no se ven entre sí; el balanceador hace round-trip por el host (10.0.2.2).
#
# INSTRUCCIONES:
# 1. Copiar este fichero a /etc/apache2/sites-available/000-default.conf en VM1
# 2. Habilitar módulos: sudo a2enmod proxy proxy_balancer proxy_http lbmethod_byrequests headers rewrite
# 3. Reiniciar Apache: sudo systemctl restart apache2.service

<VirtualHost *:80>

    ProxyRequests Off

    # 10.0.2.2 es la IP del PC host vista desde la VM (gateway NAT).
    # Los puertos 18000/28000/38000 son port-forwards del host hacia
    # gunicorn/runserver de VM1/VM2/VM3 (puerto 8000 dentro de cada VM).
    <Proxy balancer://SI2Cluster>
        BalancerMember http://10.0.2.2:18000 route=Instance01
        BalancerMember http://10.0.2.2:28000 route=Instance02
        BalancerMember http://10.0.2.2:38000 route=Instance03

        ProxySet stickysession=ROUTEID
    </Proxy>

    Header add Set-Cookie "ROUTEID=.%{BALANCER_WORKER_ROUTE}e; path=/" env=BALANCER_ROUTE_CHANGED

    <Location /P1base>
        Require all granted
        ProxyPass balancer://SI2Cluster
        ProxyPassReverse balancer://SI2Cluster
    </Location>

    <Location /balancer-manager>
        SetHandler balancer-manager
    </Location>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/P1base
    RewriteCond %{REQUEST_URI} !^/balancer-manager
    RewriteRule ^(.*)$ /P1base$1 [R,L]

    Header edit Location ^/(?!balancer-manager)([^/]) /P1base/$1

    ServerName localhost

</VirtualHost>
